name: Custom Action
description: My first custom action

inputs:
  name:
    description: Name to greet
    required: true

runs:
  using: composite
  
  steps:

    - run: echo "Hello ${{ inputs.name }}"
      shell: bash

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip

    - name: Run tests
      shell: bash
      run: |
        cd chapter2
        python -m unittest discover